app-id: com.stevepowell.directoryindexgenerator
runtime: org.gnome.Platform
runtime-version: '46'
sdk: org.gnome.Sdk
sdk-extensions:
  - org.freedesktop.Sdk.Extension.dotnet8
command: DirectoryIndexGenerator

finish-args:
  - --share=ipc
  - --socket=fallback-x11
  - --socket=wayland
  - --filesystem=home          # needed to browse and write index files
  - --device=dri

build-options:
  append-path: /usr/lib/sdk/dotnet8/bin
  append-ld-library-path: /usr/lib/sdk/dotnet8/lib
  env:
    PKG_CONFIG_PATH: /app/lib/pkgconfig:/app/share/pkgconfig:/usr/lib/pkgconfig:/usr/share/pkgconfig
    DOTNET_CLI_TELEMETRY_OPTOUT: "true"
    DOTNET_SKIP_FIRST_TIME_EXPERIENCE: "true"

modules:
  - name: DirectoryIndexGenerator
    buildsystem: simple
    subdir: DirectoryIndexGenerator
    build-commands:
      - dotnet restore DirectoryIndexGenerator.csproj --source ./nuget-packages
      - dotnet publish DirectoryIndexGenerator.csproj -c Release -r linux-x64 --self-contained false --no-restore -o /app/bin
      - install -Dm644 Linux/com.stevepowell.directoryindexgenerator.desktop /app/share/applications/com.stevepowell.directoryindexgenerator.desktop
      - install -Dm644 Linux/com.stevepowell.directoryindexgenerator.png /app/share/icons/hicolor/256x256/apps/com.stevepowell.directoryindexgenerator.png
    sources:
      - type: dir
        path: ../..

# ── Desktop entry ──────────────────────────────────────────────────────────
# Save as Linux/com.stevepowell.directoryindexgenerator.desktop:
#
# [Desktop Entry]
# Name=Directory Index Generator
# Comment=Generate HTML indexes for any folder
# Exec=DirectoryIndexGenerator
# Icon=com.stevepowell.directoryindexgenerator
# Terminal=false
# Type=Application
# Categories=Utility;FileManager;
